server {
    listen 4443 ssl;
    server_name bot.devee.ru;

    location /gateway {
        auth_basic off;
        proxy_pass https://127.0.0.1:18791/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-OpenClaw-Token $http_x_openclaw_token;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location / {
        auth_basic "OpenClaw Canary";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;
        proxy_pass https://127.0.0.1:18791;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-OpenClaw-Token "558de4e160f2684ba4dc7b33fb6517fabfc7c6418fe28c30";
        proxy_set_header Authorization "Bearer 558de4e160f2684ba4dc7b33fb6517fabfc7c6418fe28c30";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    ssl_certificate /etc/letsencrypt/live/devee.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devee.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
