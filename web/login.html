<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillRadar — Вход</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const stored = localStorage.getItem('sr-theme') || 'auto';
        const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', stored === 'auto' ? preferred : stored);
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-semibold" href="index.html">
          <span class="sr-logo">SR</span>
          SkillRadar
        </a>
        <div class="d-flex align-items-center gap-2">
          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
              Тема
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><button class="dropdown-item" data-sr-theme="light">Светлая</button></li>
              <li><button class="dropdown-item" data-sr-theme="dark">Темная</button></li>
              <li><button class="dropdown-item" data-sr-theme="auto">Авто</button></li>
            </ul>
          </div>
          <a class="btn btn-outline-secondary" href="portal/dashboard.html">Портал</a>
        </div>
      </div>
    </nav>

    <main class="sr-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <div class="card sr-card">
              <div class="card-body">
                <h1 class="h4 fw-semibold mb-3">Вход в SkillRadar</h1>
                <p class="sr-muted">Введите email, получите магическую ссылку (в dev вернём токен).</p>

                <form id="login-form" class="mb-3">
                  <label class="form-label" for="email">Email</label>
                  <div class="input-group">
                    <input id="email" type="email" class="form-control" placeholder="you@company.com" required />
                    <button class="btn btn-primary" type="submit">Отправить</button>
                  </div>
                </form>

                <div id="login-result" class="alert alert-info d-none"></div>

                <form id="verify-form" class="mt-4">
                  <label class="form-label" for="token">Токен</label>
                  <div class="input-group">
                    <input id="token" type="text" class="form-control" placeholder="debug token" required />
                    <button class="btn btn-outline-secondary" type="submit">Подтвердить</button>
                  </div>
                </form>

                <div id="verify-result" class="alert alert-success d-none mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="theme.js"></script>
    <script src="login.js"></script>
  </body>
</html>
